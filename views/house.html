<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude's army — house</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    :root { --house-color: var(--coral); }

    /* ── Hero ── */
    .house-hero {
      padding: 2.5rem 0 1.75rem;
    }

    .house-hero__eyebrow {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--house-color);
      margin-bottom: 0.4rem;
    }

    .house-hero__name {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .house-hero__motto {
      font-size: 0.9375rem;
      font-style: italic;
      color: var(--muted);
      max-width: 480px;
    }

    /* ── Form ── */
    .house-form {
      max-width: 600px;
      padding-bottom: 2.5rem;
    }

    .form-section {
      margin-bottom: 1.75rem;
    }

    .form-label {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .form-label__sub {
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .form-textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      color: var(--ink);
      background: var(--bg);
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .form-textarea:focus { border-color: var(--house-color); }

    .form-input:focus { border-color: var(--house-color); }

    /* ── Encouragement checkbox ── */
    .checkbox-section {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      margin-bottom: 1.75rem;
      transition: border-color 0.15s ease;
    }

    .checkbox-section:hover { border-color: var(--house-color); }

    .checkbox-section input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--house-color);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checkbox-section__label {
      font-size: 0.9375rem;
      color: var(--ink);
      cursor: pointer;
      line-height: 1.4;
    }

    .checkbox-section__label span {
      display: block;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* ── Submit button ── */
    .btn--house {
      background: var(--house-color);
      color: #fff;
      filter: none;
      transition: filter 0.15s ease, transform 0.15s ease;
    }

    .btn--house:hover { filter: brightness(0.9); }

    /* ── Confirm banner ── */
    .confirm-banner {
      display: none;
      align-items: center;
      gap: 0.75rem;
      border: 1.5px solid var(--house-color);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem;
      margin-bottom: 2rem;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--ink);
    }

    .confirm-banner.visible { display: flex; }

    /* ── This week section ── */
    .house-week {
      max-width: 600px;
      padding-bottom: 4rem;
    }

    .house-week__heading {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.35rem;
    }

    .house-week__meta {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* ── House check-in cards ── */
    .hc-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--house-color);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .hc-card--encourage {
      background: rgba(212, 168, 67, 0.05);
    }

    .hc-card__header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    .hc-card__name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      text-transform: lowercase;
    }

    .encourage-flag {
      font-size: 0.9rem;
      margin-left: 0.35rem;
    }

    .hc-card__time {
      font-size: 0.8125rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .hc-card__fields {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .hc-card__label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .hc-card__field--commit .hc-card__label {
      color: var(--house-color);
    }

    .hc-card__text {
      font-size: 0.9375rem;
      color: var(--ink);
      line-height: 1.55;
    }

    .hc-card__field--commit .hc-card__text {
      font-weight: 500;
    }

    .hc-card__text--empty {
      font-size: 0.9375rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
    }

    .empty-state__emoji { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty-state__text { font-size: 1rem; margin: 0; }

    .loading-state { color: var(--muted); font-size: 0.9375rem; padding: 1rem 0; }
  </style>
</head>
<body>
<script>
// Run before paint so house color is applied immediately
const HOUSE_DATA = {
  lovelace: { name: 'House Lovelace', archetype: 'The Builders',       motto: 'The bug is the lesson.',                                          color: '#c94858' },
  turing:   { name: 'House Turing',   archetype: 'The Puzzle-Solvers', motto: 'What question are we actually asking?',                            color: '#4b7dbf' },
  hopper:   { name: 'House Hopper',   archetype: 'The Translators',    motto: "The most dangerous phrase is \u2018we\u2019ve always done it this way.\u2019", color: '#3aa876' }
};
const HOUSE_NAME = window.location.pathname.split('/').pop().toLowerCase();
const HOUSE = HOUSE_DATA[HOUSE_NAME];
if (!HOUSE) {
  window.location.href = '/houses';
} else {
  document.documentElement.style.setProperty('--house-color', HOUSE.color);
}
</script>

  <header class="site-header">
    <div class="container">
      <div class="site-header__inner">
        <a href="/dashboard" class="site-header__logo">claude's <span>army</span></a>
        <nav class="site-header__nav">
          <div class="nav-links">
            <a href="/checkin">check-in</a>
            <a href="/feynman">feynman</a>
            <a href="/digest">digest</a>
            <a href="/houses">houses</a>
            <a href="/meetings">meetings</a>
            <a href="/demos">demos</a>
            <a href="/map">map</a>
          </div>
          <form method="POST" action="/logout" style="margin:0">
            <button type="submit" class="btn btn--ghost" style="padding:0.4rem 1rem;font-size:0.8125rem;">log out</button>
          </form>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <div class="house-hero">
        <p class="house-hero__eyebrow" id="house-archetype"></p>
        <h1 class="house-hero__name" id="house-name"></h1>
        <p class="house-hero__motto" id="house-motto"></p>
      </div>

      <hr class="divider">

      <div class="confirm-banner" id="confirm-banner" role="alert">
        <span>your house sees you. keep going. &#x1F3E0;</span>
      </div>

      <form class="house-form" id="house-form" novalidate>

        <div class="form-section">
          <label class="form-label" for="personName">your name</label>
          <input
            class="form-input"
            type="text"
            id="personName"
            name="name"
            placeholder="first name is fine"
            required
            autocomplete="given-name"
          >
        </div>

        <div class="form-section">
          <label class="form-label" for="didThisWeek">
            what did you actually do, build, or try this week?
            <span class="form-label__sub">not what you watched — what you did</span>
          </label>
          <textarea
            class="form-textarea"
            id="didThisWeek"
            name="didThisWeek"
            placeholder="built something, tried something, broke something..."
          ></textarea>
        </div>

        <div class="form-section">
          <label class="form-label" for="stuckOn">
            what are you stuck on or confused about?
            <span class="form-label__sub">be specific</span>
          </label>
          <textarea
            class="form-textarea"
            id="stuckOn"
            name="stuckOn"
            placeholder="the more specific, the more useful..."
          ></textarea>
        </div>

        <div class="form-section">
          <label class="form-label" for="commitment">what's your concrete commitment before we meet again?</label>
          <textarea
            class="form-textarea"
            id="commitment"
            name="commitment"
            placeholder="one specific thing you will do (not 'learn more about X' — do what, exactly?)"
          ></textarea>
        </div>

        <label class="checkbox-section" for="needsEncouragement">
          <input type="checkbox" id="needsEncouragement" name="needsEncouragement">
          <div class="checkbox-section__label">
            I'm behind this week and could use some encouragement
            <span>your housemates will know to reach out 💙</span>
          </div>
        </label>

        <p class="form-error" id="form-error" style="display:none; margin-bottom:1rem;"></p>

        <button type="submit" class="btn btn--house" id="submit-btn">check in with your house</button>

      </form>

      <hr class="divider">

      <section class="house-week">
        <h2 class="house-week__heading">this week</h2>
        <p class="house-week__meta" id="house-week-meta"></p>
        <div id="house-checkins-list">
          <p class="loading-state">loading...</p>
        </div>
      </section>

    </div>
  </main>

  <script>
    // HOUSE_DATA, HOUSE_NAME, HOUSE are already defined in the early script above

    // Populate static content
    if (HOUSE) {
      document.getElementById('house-archetype').textContent = HOUSE.archetype;
      document.getElementById('house-name').textContent = HOUSE.name;
      document.getElementById('house-motto').textContent = `\u201c${HOUSE.motto}\u201d`;
      document.title = `claude\u2019s army \u2014 ${HOUSE.name.toLowerCase()}`;

      // Style confirm banner with house color
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }
      const banner = document.getElementById('confirm-banner');
      banner.style.borderColor = HOUSE.color;
      banner.style.backgroundColor = hexToRgba(HOUSE.color, 0.07);
    }

    // ── Form submit ──
    const form = document.getElementById('house-form');
    const submitBtn = document.getElementById('submit-btn');
    const formError = document.getElementById('form-error');
    const banner = document.getElementById('confirm-banner');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.style.display = 'none';

      const data = {
        name:               form.elements.name.value.trim(),
        house:              HOUSE_NAME,
        didThisWeek:        form.didThisWeek.value.trim(),
        stuckOn:            form.stuckOn.value.trim(),
        commitment:         form.commitment.value.trim(),
        needsEncouragement: form.needsEncouragement.checked
      };

      if (!data.name) {
        formError.textContent = 'your name is required.';
        formError.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'sending...';

      try {
        const res = await fetch('/api/house-checkins', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error();
        form.reset();
        banner.classList.add('visible');
        banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        await loadHouseCheckins();
      } catch {
        formError.textContent = 'something went wrong — please try again.';
        formError.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'check in with your house';
      }
    });

    form.addEventListener('input', () => {
      banner.classList.remove('visible');
    }, { once: true });

    // ── Check-in list ──
    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins} minute${mins === 1 ? '' : 's'} ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs} hour${hrs === 1 ? '' : 's'} ago`;
      const days = Math.floor(hrs / 24);
      return `${days} day${days === 1 ? '' : 's'} ago`;
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function field(label, value, isCommit) {
      const cls = isCommit ? ' hc-card__field--commit' : '';
      const textEl = value
        ? `<div class="hc-card__text">${esc(value)}</div>`
        : `<div class="hc-card__text--empty">nothing shared</div>`;
      return `<div class="hc-card__field${cls}">
        <div class="hc-card__label">${label}</div>
        ${textEl}
      </div>`;
    }

    function renderHouseCard(c) {
      const flag = c.needsEncouragement ? '<span class="encourage-flag">&#x1F499;</span>' : '';
      return `
        <div class="hc-card${c.needsEncouragement ? ' hc-card--encourage' : ''}">
          <div class="hc-card__header">
            <div class="hc-card__name">${esc(c.name)}${flag}</div>
            <div class="hc-card__time">${timeAgo(c.timestamp)}</div>
          </div>
          <div class="hc-card__fields">
            ${field('what they did', c.didThisWeek, false)}
            ${field('stuck on', c.stuckOn, false)}
            ${field('commitment', c.commitment, true)}
          </div>
        </div>`;
    }

    async function loadHouseCheckins() {
      const list = document.getElementById('house-checkins-list');
      const meta = document.getElementById('house-week-meta');
      try {
        const res = await fetch(`/api/house-checkins/${HOUSE_NAME}`);
        if (!res.ok) throw new Error();
        const { checkins } = await res.json();
        if (checkins.length === 0) {
          meta.textContent = '';
          list.innerHTML = `
            <div class="empty-state">
              <div class="empty-state__emoji">&#x1F3E0;</div>
              <p class="empty-state__text">no check-ins yet this week — be the first!</p>
            </div>`;
        } else {
          meta.textContent = `${checkins.length} check-in${checkins.length === 1 ? '' : 's'} this week`;
          list.innerHTML = checkins.map(renderHouseCard).join('');
        }
      } catch {
        list.innerHTML = '<p style="color:#e05454;font-size:0.9375rem;">could not load check-ins — please refresh.</p>';
      }
    }

    loadHouseCheckins();
  </script>
  <script src="/js/nav.js"></script>

</body>
</html>
