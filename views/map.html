<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude's army — cohort map</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .map-intro {
      padding: 2.5rem 0 0.5rem;
    }

    .map-intro__eyebrow {
      font-size: 0.8125rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--teal);
      margin-bottom: 0.5rem;
    }

    .map-intro__title {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .map-intro__subtitle {
      color: var(--muted);
      font-size: 0.9375rem;
      max-width: 520px;
    }

    /* ── Form ── */
    .map-form-wrap {
      max-width: 640px;
      margin-bottom: 2.5rem;
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 480px) {
      .form-row-2 { grid-template-columns: 1fr; }
    }

    .form-section {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    .form-label__optional {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.8125rem;
      margin-left: 0.35rem;
    }

    /* ── Confirm banner ── */
    .confirm-banner {
      display: none;
      align-items: center;
      gap: 0.6rem;
      background: rgba(58, 168, 118, 0.1);
      border: 1px solid rgba(58, 168, 118, 0.3);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      font-size: 0.9375rem;
      color: #70c898;
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    .confirm-banner.visible { display: flex; }

    /* ── Error ── */
    .map-error {
      display: none;
      font-size: 0.875rem;
      color: #e05454;
      margin-top: 0.65rem;
    }

    .map-error.visible { display: block; }

    /* ── Map note ── */
    .map-note {
      font-size: 0.875rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* ── Stage map ── */
    .stage-map-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 4rem;
      padding-bottom: 4px;
    }

    .stage-map {
      display: grid;
      grid-template-columns: repeat(5, minmax(175px, 1fr));
      min-width: 760px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .stage-col {
      border-right: 1px solid var(--border);
    }

    .stage-col:last-child {
      border-right: none;
    }

    .stage-col__header {
      background: var(--surface);
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--border);
    }

    .stage-col__num {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--teal);
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stage-col__name {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--ink);
      text-transform: lowercase;
      line-height: 1.3;
    }

    .stage-col__months {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .stage-col__people {
      padding: 0.75rem;
      min-height: 120px;
    }

    .stage-col__empty {
      font-size: 0.8125rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Person card ── */
    .map-person {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.65rem;
      margin-bottom: 0.5rem;
    }

    .map-person:last-child { margin-bottom: 0; }

    .map-person__top {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .map-person__name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--ink);
    }

    .map-person__house {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .house--lovelace { background: rgba(201, 72, 88, 0.15);  color: #e8808a; }
    .house--turing   { background: rgba(75, 125, 191, 0.15); color: #80aae0; }
    .house--hopper   { background: rgba(58, 168, 118, 0.15); color: #70c898; }

    .map-person__track {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.2rem;
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="site-header__inner">
        <a href="/dashboard" class="site-header__logo">claude's <span>army</span></a>
        <nav class="site-header__nav">
          <div class="nav-links">
            <a href="/checkin">check-in</a>
            <a href="/feynman">feynman</a>
            <a href="/digest">digest</a>
            <a href="/houses">houses</a>
            <a href="/meetings">meetings</a>
            <a href="/demos">demos</a>
            <a href="/map">map</a>
          </div>
          <form method="POST" action="/logout" style="margin:0">
            <button type="submit" class="btn btn--ghost" style="padding:0.4rem 1rem;font-size:0.8125rem;">log out</button>
          </form>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <div class="map-intro">
        <p class="map-intro__eyebrow">cohort map</p>
        <h1 class="map-intro__title">where is everyone?</h1>
        <p class="map-intro__subtitle">mark where you are in the program. the map updates when you do.</p>
      </div>

      <hr class="divider">

      <!-- Self-report form -->
      <div class="map-form-wrap">
        <div class="confirm-banner" id="confirm-banner"></div>

        <form id="map-form" novalidate>
          <div class="form-row-2">
            <div class="form-section">
              <label class="form-label" for="map-name">your name</label>
              <input class="form-input" type="text" id="map-name" placeholder="your name" autocomplete="off">
            </div>
            <div class="form-section">
              <label class="form-label" for="map-house">
                house <span class="form-label__optional">optional</span>
              </label>
              <select class="form-input" id="map-house">
                <option value="">— pick your house —</option>
                <option value="lovelace">House Lovelace</option>
                <option value="turing">House Turing</option>
                <option value="hopper">House Hopper</option>
              </select>
            </div>
          </div>

          <div class="form-section">
            <label class="form-label" for="map-stage">current stage</label>
            <select class="form-input" id="map-stage">
              <option value="">— where are you? —</option>
              <option value="stage1">Stage 1 — Foundations</option>
              <option value="stage2">Stage 2 — AI &amp; ML Fundamentals</option>
              <option value="stage3">Stage 3 — RAGs, Agents &amp; Applied AI</option>
              <option value="stage4">Stage 4 — Governance &amp; Policy</option>
              <option value="stage5">Stage 5 — Applied Projects</option>
            </select>
          </div>

          <div class="form-section" id="track-section" style="display:none">
            <label class="form-label" for="map-track">
              track <span class="form-label__optional">optional</span>
            </label>
            <select class="form-input" id="map-track">
              <option value="">— pick a track —</option>
            </select>
          </div>

          <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn--primary" id="map-submit">update my position</button>
          </div>

          <p class="map-error" id="map-error"></p>
        </form>
      </div>

      <!-- Map note + visualization -->
      <p class="map-note">this is a map, not a race. everyone moves at their own pace.</p>

      <div class="stage-map-container">
        <div class="stage-map" id="stage-map">
          <p style="padding:1rem;color:var(--muted);grid-column:1/-1;font-size:0.9375rem;">loading...</p>
        </div>
      </div>

    </div>
  </main>

  <script>
    const STAGES = [
      { id: 'stage1', num: '01', name: 'foundations',                months: 'month 1–2'  },
      { id: 'stage2', num: '02', name: 'ai & ml fundamentals',       months: 'month 3–4'  },
      { id: 'stage3', num: '03', name: 'rags, agents & applied ai',  months: 'month 5–6'  },
      { id: 'stage4', num: '04', name: 'governance & policy',        months: 'month 7–8'  },
      { id: 'stage5', num: '05', name: 'applied projects',           months: 'month 9–12' },
    ];

    const TRACKS = {
      stage1: [
        'Track A — AI-Accelerated',
        'Track B — Deep Foundations',
      ],
      stage3: [
        'Policy Intelligence',
        'Research & Synthesis',
        'Service Design',
      ],
      stage5: [
        'Capstone 1 — Map a Real AI System',
        'Capstone 2 — Grant Brief',
        'Capstone 3 — Procurement Critique',
        'Capstone 4 — Build a RAG/Agent',
        'Capstone 5 — Natural Intelligence Design',
        'Capstone 6 — Equitable AI Product',
      ],
    };

    // ── Track dropdown toggle ──
    const stageSelect  = document.getElementById('map-stage');
    const trackSection = document.getElementById('track-section');
    const trackSelect  = document.getElementById('map-track');

    stageSelect.addEventListener('change', () => {
      const tracks = TRACKS[stageSelect.value];
      if (tracks) {
        trackSelect.innerHTML = '<option value="">— pick a track —</option>' +
          tracks.map(t => `<option value="${t}">${t}</option>`).join('');
        trackSection.style.display = '';
      } else {
        trackSection.style.display = 'none';
        trackSelect.value = '';
      }
    });

    // ── Escape HTML ──
    function esc(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── House badge ──
    function houseBadge(house) {
      const labels = { lovelace: 'Lovelace', turing: 'Turing', hopper: 'Hopper' };
      if (!house || !labels[house]) return '';
      return `<span class="map-person__house house--${house}">${labels[house]}</span>`;
    }

    // ── Render map ──
    function renderMap(entries) {
      const mapEl = document.getElementById('stage-map');
      const byStage = {};
      STAGES.forEach(s => { byStage[s.id] = []; });
      entries.forEach(e => { if (byStage[e.stage]) byStage[e.stage].push(e); });

      mapEl.innerHTML = STAGES.map(s => {
        const people = byStage[s.id];
        const peopleHtml = people.length === 0
          ? '<p class="stage-col__empty">none yet</p>'
          : people.map(p => `
              <div class="map-person">
                <div class="map-person__top">
                  <span class="map-person__name">${esc(p.name)}</span>
                  ${houseBadge(p.house)}
                </div>
                ${p.track ? `<div class="map-person__track">${esc(p.track)}</div>` : ''}
              </div>`).join('');

        return `
          <div class="stage-col">
            <div class="stage-col__header">
              <div class="stage-col__num">${s.num}</div>
              <div class="stage-col__name">${s.name}</div>
              <div class="stage-col__months">${s.months}</div>
            </div>
            <div class="stage-col__people">${peopleHtml}</div>
          </div>`;
      }).join('');
    }

    // ── Load map ──
    async function loadMap() {
      try {
        const res = await fetch('/api/map');
        if (!res.ok) throw new Error();
        const { entries } = await res.json();
        renderMap(entries);
      } catch {
        document.getElementById('stage-map').innerHTML =
          '<p style="padding:1rem;color:#e05454;grid-column:1/-1;font-size:0.9375rem;">could not load map — please refresh.</p>';
      }
    }

    // ── Form submit ──
    const form          = document.getElementById('map-form');
    const submitBtn     = document.getElementById('map-submit');
    const errorEl       = document.getElementById('map-error');
    const confirmBanner = document.getElementById('confirm-banner');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }

    function clearError() {
      errorEl.textContent = '';
      errorEl.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      confirmBanner.classList.remove('visible');

      const name  = document.getElementById('map-name').value.trim();
      const stage = stageSelect.value;

      if (!name) {
        showError('please enter your name.');
        document.getElementById('map-name').focus();
        return;
      }
      if (!stage) {
        showError('please select your current stage.');
        stageSelect.focus();
        return;
      }

      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/map', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            house: document.getElementById('map-house').value,
            stage,
            track: trackSelect.value,
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'something went wrong — please try again.');
          return;
        }

        confirmBanner.textContent = data.updated ? 'position updated.' : "you're on the map.";
        confirmBanner.classList.add('visible');
        confirmBanner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        await loadMap();
      } catch {
        showError('something went wrong — try again in a moment.');
      } finally {
        submitBtn.disabled = false;
      }
    });

    // Load on init
    loadMap();
  </script>
  <script src="/js/nav.js"></script>

</body>
</html>
